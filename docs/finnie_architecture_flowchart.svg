<svg width="100%" viewBox="0 0 680 980" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Finnie AI Finance Assistant — architecture flowchart</title>
  <desc>Top-down flowchart showing user input flowing through guardrails, LangGraph intent detection, seven agents, portfolio manager, and shared infrastructure back to the user</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; fill: #1E293B; }
      .ts  { font-size: 12px; font-weight: 400; fill: #475569; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
      .c-teal   .th  { fill: #085041; }
      .c-teal   .ts  { fill: #0F6E56; }
      .c-red    rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
      .c-red    .th  { fill: #791F1F; }
      .c-red    .ts  { fill: #A32D2D; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
      .c-purple .th  { fill: #3C3489; }
      .c-purple .ts  { fill: #534AB7; }
      .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
      .c-blue   .th  { fill: #0C447C; }
      .c-blue   .ts  { fill: #185FA5; }
      .c-coral  rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
      .c-coral  .th  { fill: #712B13; }
      .c-coral  .ts  { fill: #993C1D; }
      .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
      .c-amber  .th  { fill: #633806; }
      .c-amber  .ts  { fill: #854F0B; }
      .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
      .c-gray   .th  { fill: #444441; }
      .c-gray   .ts  { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- Step 1: User -->
  <g class="c-teal">
    <rect x="240" y="20" width="200" height="44" rx="8"/>
    <text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central">User</text>
    <text class="ts" x="340" y="56" text-anchor="middle" dominant-baseline="central">types message in chat</text>
  </g>
  <line x1="340" y1="64" x2="340" y2="94" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2: Streamlit -->
  <g class="c-teal">
    <rect x="215" y="94" width="250" height="44" rx="8"/>
    <text class="th" x="340" y="112" text-anchor="middle" dominant-baseline="central">Streamlit UI</text>
    <text class="ts" x="340" y="130" text-anchor="middle" dominant-baseline="central">Chat · Portfolio · Market tabs</text>
  </g>
  <line x1="340" y1="138" x2="340" y2="168" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 3: Input guardrail -->
  <g class="c-red">
    <rect x="175" y="168" width="330" height="56" rx="8"/>
    <text class="th" x="340" y="188" text-anchor="middle" dominant-baseline="central">Input guardrail</text>
    <text class="ts" x="340" y="208" text-anchor="middle" dominant-baseline="central">blocked patterns · off-topic LLM check</text>
  </g>
  <path d="M175 196 L120 196 L120 290 L175 290" fill="none" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="108" y="244" text-anchor="middle" dominant-baseline="central">blocked</text>
  <line x1="340" y1="224" x2="340" y2="254" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="356" y="240" dominant-baseline="central">safe</text>

  <!-- Blocked response -->
  <g class="c-red">
    <rect x="22" y="268" width="153" height="44" rx="8"/>
    <text class="th" x="98" y="284" text-anchor="middle" dominant-baseline="central">Blocked response</text>
    <text class="ts" x="98" y="302" text-anchor="middle" dominant-baseline="central">redirect message</text>
  </g>

  <!-- Step 4: Router -->
  <g class="c-gray">
    <rect x="215" y="254" width="250" height="44" rx="8"/>
    <text class="th" x="340" y="272" text-anchor="middle" dominant-baseline="central">router.py</text>
    <text class="ts" x="340" y="290" text-anchor="middle" dominant-baseline="central">graph.invoke(initial_state)</text>
  </g>
  <line x1="340" y1="298" x2="340" y2="328" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 5: LangGraph -->
  <g class="c-purple">
    <rect x="175" y="328" width="330" height="56" rx="8"/>
    <text class="th" x="340" y="348" text-anchor="middle" dominant-baseline="central">LangGraph — detect_intent node</text>
    <text class="ts" x="340" y="368" text-anchor="middle" dominant-baseline="central">FinanceState · keyword routing · conditional edges</text>
  </g>

  <!-- Fan arrows -->
  <path d="M215 384 L52  420" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M245 384 L142 420" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M285 384 L232 420" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="384" x2="340" y2="420" class="arr" marker-end="url(#arrow)"/>
  <path d="M395 384 L450 420" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M440 384 L540 420" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M465 384 L620 420" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: 7 Agents -->
  <g class="c-blue">
    <rect x="12"  y="420" width="80" height="56" rx="8"/>
    <text class="th" x="52"  y="438" text-anchor="middle" dominant-baseline="central">Finance</text>
    <text class="ts" x="52"  y="455" text-anchor="middle" dominant-baseline="central">Q&amp;A</text>
    <text class="ts" x="52"  y="468" text-anchor="middle" dominant-baseline="central">+ RAG</text>
  </g>
  <g class="c-blue">
    <rect x="100" y="420" width="80" height="56" rx="8"/>
    <text class="th" x="140" y="438" text-anchor="middle" dominant-baseline="central">Market</text>
    <text class="ts" x="140" y="455" text-anchor="middle" dominant-baseline="central">live</text>
    <text class="ts" x="140" y="468" text-anchor="middle" dominant-baseline="central">prices</text>
  </g>
  <g class="c-blue">
    <rect x="188" y="420" width="80" height="56" rx="8"/>
    <text class="th" x="228" y="438" text-anchor="middle" dominant-baseline="central">Portfolio</text>
    <text class="ts" x="228" y="455" text-anchor="middle" dominant-baseline="central">holdings</text>
    <text class="ts" x="228" y="468" text-anchor="middle" dominant-baseline="central">P&amp;L</text>
  </g>
  <g class="c-coral">
    <rect x="276" y="420" width="80" height="56" rx="8"/>
    <text class="th" x="316" y="438" text-anchor="middle" dominant-baseline="central">Goal</text>
    <text class="ts" x="316" y="455" text-anchor="middle" dominant-baseline="central">savings</text>
    <text class="ts" x="316" y="468" text-anchor="middle" dominant-baseline="central">planning</text>
  </g>
  <g class="c-coral">
    <rect x="364" y="420" width="80" height="56" rx="8"/>
    <text class="th" x="404" y="438" text-anchor="middle" dominant-baseline="central">News</text>
    <text class="ts" x="404" y="455" text-anchor="middle" dominant-baseline="central">financial</text>
    <text class="ts" x="404" y="468" text-anchor="middle" dominant-baseline="central">headlines</text>
  </g>
  <g class="c-coral">
    <rect x="452" y="420" width="80" height="56" rx="8"/>
    <text class="th" x="492" y="438" text-anchor="middle" dominant-baseline="central">Tax</text>
    <text class="ts" x="492" y="455" text-anchor="middle" dominant-baseline="central">IRA</text>
    <text class="ts" x="492" y="468" text-anchor="middle" dominant-baseline="central">401k</text>
  </g>
  <g class="c-amber">
    <rect x="540" y="420" width="80" height="56" rx="8"/>
    <text class="th" x="580" y="438" text-anchor="middle" dominant-baseline="central">Trade</text>
    <text class="ts" x="580" y="455" text-anchor="middle" dominant-baseline="central">buy</text>
    <text class="ts" x="580" y="468" text-anchor="middle" dominant-baseline="central">sell</text>
  </g>

  <!-- Infrastructure side arrows -->
  <path d="M12 448 L12 548 L90 548" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M100 460 L68 530 L90 530" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M188 460 L136 530 L90 530" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="476" x2="580" y2="548" stroke="#BA7517" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 7: Infrastructure -->
  <g class="c-teal">
    <rect x="90"  y="520" width="160" height="56" rx="8"/>
    <text class="th" x="170" y="538" text-anchor="middle" dominant-baseline="central">RAG system</text>
    <text class="ts" x="170" y="556" text-anchor="middle" dominant-baseline="central">ChromaDB · embeddings</text>
    <text class="ts" x="170" y="572" text-anchor="middle" dominant-baseline="central">semantic retrieval</text>
  </g>
  <g class="c-teal">
    <rect x="270" y="520" width="160" height="56" rx="8"/>
    <text class="th" x="350" y="538" text-anchor="middle" dominant-baseline="central">yFinance API</text>
    <text class="ts" x="350" y="556" text-anchor="middle" dominant-baseline="central">prices · news</text>
    <text class="ts" x="350" y="572" text-anchor="middle" dominant-baseline="central">history · tickers</text>
  </g>
  <g class="c-amber">
    <rect x="450" y="520" width="180" height="56" rx="8"/>
    <text class="th" x="540" y="538" text-anchor="middle" dominant-baseline="central">Portfolio manager</text>
    <text class="ts" x="540" y="556" text-anchor="middle" dominant-baseline="central">buy · sell · summary</text>
    <text class="ts" x="540" y="572" text-anchor="middle" dominant-baseline="central">portfolio.json</text>
  </g>

  <!-- Converging to LLM -->
  <path d="M52  476 L52  618 L200 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M140 476 L140 618 L200 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M228 476 L228 618 L200 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M316 476 L316 618 L480 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M404 476 L404 618 L480 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M492 476 L492 618 L480 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M580 576 L580 618 L480 618" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 8: LLM -->
  <g class="c-purple">
    <rect x="175" y="600" width="330" height="56" rx="8"/>
    <text class="th" x="340" y="620" text-anchor="middle" dominant-baseline="central">LLM — GPT-4o-mini</text>
    <text class="ts" x="340" y="640" text-anchor="middle" dominant-baseline="central">system prompt + context + question</text>
  </g>
  <line x1="340" y1="656" x2="340" y2="686" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 9: Output guardrail -->
  <g class="c-red">
    <rect x="175" y="686" width="330" height="56" rx="8"/>
    <text class="th" x="340" y="706" text-anchor="middle" dominant-baseline="central">Output guardrail</text>
    <text class="ts" x="340" y="726" text-anchor="middle" dominant-baseline="central">disclaimer · referral note · clean response</text>
  </g>
  <line x1="340" y1="742" x2="340" y2="772" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 10: Knowledge base -->
  <g class="c-gray">
    <rect x="175" y="772" width="330" height="56" rx="8"/>
    <text class="th" x="340" y="792" text-anchor="middle" dominant-baseline="central">Knowledge base sources</text>
    <text class="ts" x="340" y="812" text-anchor="middle" dominant-baseline="central">investing_basics · retirement · 8 Wikipedia articles</text>
  </g>
  <line x1="340" y1="828" x2="340" y2="858" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 11: Response -->
  <g class="c-teal">
    <rect x="215" y="858" width="250" height="44" rx="8"/>
    <text class="th" x="340" y="876" text-anchor="middle" dominant-baseline="central">Response displayed</text>
    <text class="ts" x="340" y="894" text-anchor="middle" dominant-baseline="central">chat · portfolio updated · charts</text>
  </g>

  <!-- Blocked return path -->
  <path d="M98 312 L98 878 L215 878" fill="none" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="22"  y="940" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56"/>
  <text class="ts" x="36"  y="948" dominant-baseline="central">UI / response</text>
  <rect x="130" y="940" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7"/>
  <text class="ts" x="144" y="948" dominant-baseline="central">LangGraph</text>
  <rect x="220" y="940" width="10" height="10" rx="2" fill="#FCEBEB" stroke="#A32D2D"/>
  <text class="ts" x="234" y="948" dominant-baseline="central">Guardrails</text>
  <rect x="310" y="940" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5"/>
  <text class="ts" x="324" y="948" dominant-baseline="central">Education agents</text>
  <rect x="430" y="940" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D"/>
  <text class="ts" x="444" y="948" dominant-baseline="central">Planning agents</text>
  <rect x="544" y="940" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B"/>
  <text class="ts" x="558" y="948" dominant-baseline="central">Trade / portfolio</text>
</svg>
