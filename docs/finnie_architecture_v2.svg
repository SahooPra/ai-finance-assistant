<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Finnie AI Finance Assistant — full architecture v2</title>
  <desc>Structural diagram showing all layers: Streamlit UI, guardrails, LangGraph state machine, seven specialized agents, portfolio manager, RAG knowledge base, Wikipedia articles, market data API, and project files</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; }
      .th  { font-size: 14px; font-weight: 600; fill: #1E293B; }
      .ts  { font-size: 12px; font-weight: 400; fill: #475569; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal   .th  { fill: #085041; }
      .c-teal   .ts  { fill: #0F6E56; }
      .c-red    rect { fill: #FCEBEB; stroke: #A32D2D; }
      .c-red    .th  { fill: #791F1F; }
      .c-red    .ts  { fill: #A32D2D; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #3C3489; }
      .c-purple .ts  { fill: #534AB7; }
      .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue   .th  { fill: #0C447C; }
      .c-blue   .ts  { fill: #185FA5; }
      .c-coral  rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral  .th  { fill: #712B13; }
      .c-coral  .ts  { fill: #993C1D; }
      .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber  .th  { fill: #633806; }
      .c-amber  .ts  { fill: #854F0B; }
      .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray   .th  { fill: #444441; }
      .c-gray   .ts  { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- TIER 1: UI -->
  <g class="c-teal">
    <rect x="165" y="16" width="350" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="34" text-anchor="middle" dominant-baseline="central">Streamlit web UI</text>
    <text class="ts" x="340" y="54" text-anchor="middle" dominant-baseline="central">Chat · Portfolio · Market tabs</text>
  </g>
  <line x1="340" y1="68" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

  <!-- TIER 2: Guardrails -->
  <g class="c-red">
    <rect x="115" y="100" width="450" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central">Guardrails layer</text>
    <text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central">Input check · blocked patterns · off-topic filter · output disclaimer</text>
  </g>
  <line x1="340" y1="156" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>

  <!-- TIER 3: LangGraph -->
  <g class="c-purple">
    <rect x="115" y="188" width="450" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="208" text-anchor="middle" dominant-baseline="central">LangGraph state machine</text>
    <text class="ts" x="340" y="228" text-anchor="middle" dominant-baseline="central">FinanceState · detect_intent · conditional edges · error handler</text>
  </g>

  <!-- fan arrows -->
  <line x1="178" y1="244" x2="66"  y2="308" class="arr" marker-end="url(#arrow)"/>
  <line x1="218" y1="244" x2="162" y2="308" class="arr" marker-end="url(#arrow)"/>
  <line x1="268" y1="244" x2="258" y2="308" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="244" x2="354" y2="308" class="arr" marker-end="url(#arrow)"/>
  <line x1="412" y1="244" x2="450" y2="308" class="arr" marker-end="url(#arrow)"/>
  <line x1="462" y1="244" x2="541" y2="308" class="arr" marker-end="url(#arrow)"/>
  <line x1="502" y1="244" x2="623" y2="308" class="arr" marker-end="url(#arrow)"/>

