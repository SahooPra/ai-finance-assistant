    <text class="ts" x="555" y="690" text-anchor="middle" dominant-baseline="central">ETF · bonds · IRA · 401k…</text>
  </g>

  <!-- TIER 8: Project files -->
  <g class="c-gray">
    <rect x="22" y="718" width="636" height="22" rx="6" stroke-width="0.5"/>
    <text class="ts" x="340" y="729" text-anchor="middle" dominant-baseline="central">Project files</text>
  </g>
  <g class="c-gray">
    <rect x="22"  y="750" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="92"  y="766" text-anchor="middle" dominant-baseline="central">test_agents.py</text>
    <text class="ts" x="92"  y="784" text-anchor="middle" dominant-baseline="central">6 / 6 passing</text>
  </g>
  <g class="c-gray">
    <rect x="174" y="750" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="244" y="766" text-anchor="middle" dominant-baseline="central">portfolio.json</text>
    <text class="ts" x="244" y="784" text-anchor="middle" dominant-baseline="central">persistent storage</text>
  </g>
  <g class="c-gray">
    <rect x="326" y="750" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="396" y="766" text-anchor="middle" dominant-baseline="central">config.yaml</text>
    <text class="ts" x="396" y="784" text-anchor="middle" dominant-baseline="central">app configuration</text>
  </g>
  <g class="c-gray">
