  <text class="ts" x="36"  y="386" dominant-baseline="central">Education agents</text>
  <rect x="140" y="378" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="154" y="386" dominant-baseline="central">Planning agents</text>
  <rect x="258" y="378" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="272" y="386" dominant-baseline="central">Trade agent</text>

  <line x1="340" y1="400" x2="340" y2="428" class="arr" marker-end="url(#arrow)"/>

