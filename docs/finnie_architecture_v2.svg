    <text class="th" x="258" y="328" text-anchor="middle" dominant-baseline="central">Portfolio</text>
    <text class="ts" x="258" y="348" text-anchor="middle" dominant-baseline="central">Holdings P&amp;L</text>
  </g>
  <g class="c-coral">
    <rect x="310" y="308" width="88" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="354" y="328" text-anchor="middle" dominant-baseline="central">Goal</text>
    <text class="ts" x="354" y="348" text-anchor="middle" dominant-baseline="central">Savings math</text>
  </g>
  <g class="c-coral">
    <rect x="406" y="308" width="88" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="450" y="328" text-anchor="middle" dominant-baseline="central">News</text>
    <text class="ts" x="450" y="348" text-anchor="middle" dominant-baseline="central">Headlines</text>
  </g>
  <g class="c-coral">
    <rect x="502" y="308" width="78" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="541" y="328" text-anchor="middle" dominant-baseline="central">Tax</text>
    <text class="ts" x="541" y="348" text-anchor="middle" dominant-baseline="central">IRA · 401k</text>
  </g>
