  <g class="c-amber">
    <rect x="115" y="428" width="450" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="448" text-anchor="middle" dominant-baseline="central">Portfolio manager</text>
    <text class="ts" x="340" y="468" text-anchor="middle" dominant-baseline="central">portfolio.json · buy · sell · get_live_price · get_portfolio_summary</text>
  </g>
  <line x1="340" y1="484" x2="340" y2="512" class="arr" marker-end="url(#arrow)"/>

