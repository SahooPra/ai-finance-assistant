    <text class="th" x="118" y="672" text-anchor="middle" dominant-baseline="central">investing_basics.txt</text>
    <text class="ts" x="118" y="690" text-anchor="middle" dominant-baseline="central">stocks · ETFs · bonds · risk</text>
  </g>
  <g class="c-gray">
    <rect x="226" y="658" width="214" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="333" y="672" text-anchor="middle" dominant-baseline="central">retirement_accounts.txt</text>
    <text class="ts" x="333" y="690" text-anchor="middle" dominant-baseline="central">401k · Roth IRA · DCA</text>
  </g>
  <g class="c-gray">
    <rect x="452" y="658" width="206" height="44" rx="8" stroke-width="0.5"/>
