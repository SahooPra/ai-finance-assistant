    <text class="th" x="262" y="562" text-anchor="middle" dominant-baseline="central">LLM config</text>
    <text class="ts" x="262" y="580" text-anchor="middle" dominant-baseline="central">GPT-4o-mini</text>
    <text class="ts" x="262" y="598" text-anchor="middle" dominant-baseline="central">temp 0.2 – 0.4</text>
  </g>
  <g class="c-gray">
