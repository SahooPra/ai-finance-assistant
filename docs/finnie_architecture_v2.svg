    <text class="ts" x="98"  y="580" text-anchor="middle" dominant-baseline="central">ChromaDB · embeddings</text>
    <text class="ts" x="98"  y="598" text-anchor="middle" dominant-baseline="central">semantic retrieval</text>
  </g>
  <g class="c-gray">
