    <rect x="22"  y="308" width="88" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="66"  y="328" text-anchor="middle" dominant-baseline="central">Finance</text>
    <text class="ts" x="66"  y="348" text-anchor="middle" dominant-baseline="central">Q&amp;A + RAG</text>
  </g>
  <g class="c-blue">
    <rect x="118" y="308" width="88" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="162" y="328" text-anchor="middle" dominant-baseline="central">Market</text>
    <text class="ts" x="162" y="348" text-anchor="middle" dominant-baseline="central">Live prices</text>
  </g>
  <g class="c-blue">
